
<canvas id="c"></canvas>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore,collection,getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const app=initializeApp({apiKey:"YOUR_KEY",projectId:"YOUR_PROJECT"});
const db=getFirestore(app);
const snap=await getDocs(collection(db,"stats_daily"));
let l=[],d=[];
snap.forEach(x=>{l.push(x.id);d.push(x.data().totalSales)});
new Chart(document.getElementById("c"),{type:"bar",data:{labels:l,datasets:[{data:d}]}})
</script>
