<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>อิ่มเอ๋ย Im-Oei</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.profile-hero{background:linear-gradient(150deg,#3E1A00 0%,#7B3F00 55%,#FF8C00 100%);padding:28px 20px 72px;position:relative;overflow:hidden;}
.profile-hero::before{content:'';position:absolute;width:260px;height:260px;border-radius:50%;background:rgba(255,193,7,0.07);top:-90px;right:-70px;}
.profile-hero::after{content:'';position:absolute;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,0.04);bottom:10px;left:-50px;}
.profile-back{color:rgba(255,255,255,0.85);text-decoration:none;display:inline-flex;align-items:center;gap:4px;margin-bottom:18px;position:relative;z-index:1;font-size:13px;font-weight:700;}
.profile-user-row{display:flex;align-items:center;gap:14px;position:relative;z-index:1;}
.profile-avatar{width:76px;height:76px;border-radius:50%;background:linear-gradient(135deg,rgba(255,193,7,0.25),rgba(255,140,0,0.18));border:3px solid rgba(255,193,7,0.7);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.3);}
.profile-info{flex:1;min-width:0;}
.profile-name{font-size:20px;font-weight:800;color:#fff;line-height:1.2;text-shadow:0 1px 6px rgba(0,0,0,0.35);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.profile-meta{display:flex;align-items:center;gap:6px;margin-top:6px;flex-wrap:wrap;}
.profile-phone-chip{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,0.13);border:1px solid rgba(255,255,255,0.22);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:700;color:rgba(255,255,255,0.92);letter-spacing:.3px;}
.profile-role-chip{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:4px 10px;font-size:11px;font-weight:800;letter-spacing:.3px;}
.profile-role-chip.customer{background:rgba(76,175,80,0.25);border:1px solid rgba(76,175,80,0.4);color:#A5D6A7;}
.profile-role-chip.admin{background:rgba(255,152,0,0.25);border:1px solid rgba(255,152,0,0.45);color:#FFCC80;}
.profile-role-chip.owner{background:rgba(255,193,7,0.25);border:1px solid rgba(255,193,7,0.45);color:#FFE082;}
.profile-logout{background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.25);color:#fff;border-radius:20px;padding:8px 14px;font-family:'Sarabun',sans-serif;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;display:flex;align-items:center;gap:6px;transition:background .2s;}
.profile-logout:active{background:rgba(255,255,255,0.25);}
.stamp-card-float{margin:-44px 16px 0;position:relative;z-index:10;}
.stamp-card{
  border-radius:22px;padding:20px 18px 18px;
  box-shadow:0 8px 36px rgba(0,0,0,0.18);
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,#3E1A00 0%,#7B3C00 50%,#C96A00 100%);
}
/* ลายโลโก้โปร่งใสด้านหลัง */
.stamp-card::before{
  content:'🍜';font-size:110px;line-height:1;
  position:absolute;right:-14px;bottom:-18px;
  opacity:0.08;transform:rotate(-15deg);pointer-events:none;
  filter:grayscale(1) brightness(3);
}
.stamp-card::after{
  content:'';position:absolute;
  width:180px;height:180px;border-radius:50%;
  background:rgba(255,193,7,0.06);
  top:-60px;left:-40px;pointer-events:none;
}
.stamp-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;position:relative;z-index:1;}
.stamp-card-left{display:flex;align-items:center;gap:8px;}
.stamp-title{font-size:15px;font-weight:800;color:#FFE082;}
.stamp-badge{background:linear-gradient(135deg,#FFC107,#FF8C00);color:#3E1000;font-size:13px;font-weight:800;padding:5px 14px;border-radius:20px;box-shadow:0 2px 8px rgba(255,140,0,0.4);}
.stamps-grid{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;padding:4px 0;position:relative;z-index:1;}
.stamp{width:36px;height:36px;border-radius:11px;border:2px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:center;transition:all .25s;}
.stamp.filled{border-color:#FFC107;background:rgba(255,193,7,0.18);box-shadow:0 2px 10px rgba(255,193,7,0.4);transform:scale(1.08);}
.stamp-progress-bar{margin-top:14px;background:rgba(255,255,255,0.12);border-radius:10px;height:7px;overflow:hidden;position:relative;z-index:1;}
.stamp-progress-fill{height:100%;background:linear-gradient(90deg,#FFC107,#FF6B00);border-radius:10px;transition:width .7s ease;box-shadow:0 0 8px rgba(255,193,7,0.5);}
.stamp-msg{font-size:12px;color:rgba(255,220,150,0.85);margin-top:8px;text-align:center;font-weight:600;position:relative;z-index:1;}
.sec-label{padding:20px 16px 8px;font-size:14px;font-weight:800;color:#3E2000;display:flex;align-items:center;gap:6px;}
.sec-count{background:#FFF3E0;color:#FF8C00;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:4px;}
.order-card{background:#fff;margin:0 16px 12px;border-radius:18px;box-shadow:0 2px 14px rgba(0,0,0,0.07);overflow:hidden;border:1.5px solid #F5EDE0;transition:transform .15s;}
.order-card:active{transform:scale(0.99);}
.order-card.active-order{border-color:#FFC107;box-shadow:0 4px 20px rgba(255,193,7,0.2);}
.order-card-head{padding:14px 16px 12px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.order-id{font-size:12px;font-weight:800;color:#FF8C00;letter-spacing:.5px;}
.order-date{font-size:12px;color:#BBB;margin-top:2px;}
.order-pickup{display:inline-flex;align-items:center;gap:4px;background:#FFF8E1;color:#5D3A00;font-size:11px;font-weight:700;padding:3px 9px;border-radius:8px;margin-top:5px;}
.status-badge{flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;}
.status-pending{background:#FFF3E0;color:#E65100;}
.status-preparing{background:#E3F2FD;color:#1565C0;}
.status-ready{background:#E8F5E9;color:#2E7D32;}
.status-done{background:#F3E5F5;color:#6A1B9A;}
.status-cancelled{background:#FFEBEE;color:#B71C1C;}
.order-divider{height:1px;background:#F5F0E8;margin:0 16px;}
.order-items{padding:10px 16px;}
.order-item-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:1px dashed #F0E8D8;}
.order-item-row:last-child{border-bottom:none;}
.order-item-name{color:#444;}
.order-item-price{font-weight:700;color:#3E2000;}
.order-footer{background:linear-gradient(135deg,#FFF8E1,#FFF3CD);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.order-total-label{font-size:12px;font-weight:700;color:#888;}
.order-total-val{font-size:20px;font-weight:800;color:#FF8C00;}
.reorder-btn{background:linear-gradient(135deg,#FFC107,#F5A623);border:none;border-radius:10px;padding:9px 18px;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:800;color:#3E2000;cursor:pointer;box-shadow:0 3px 10px rgba(255,193,7,0.35);transition:all .15s;white-space:nowrap;}
.reorder-btn:active{transform:scale(0.94);opacity:.85;}

/* ===== ACTIVE PULSE ===== */
@keyframes pulse-ring{0%{box-shadow:0 0 0 0 rgba(255,193,7,0.4)}70%{box-shadow:0 0 0 8px rgba(255,193,7,0)}100%{box-shadow:0 0 0 0 rgba(255,193,7,0)}}
.order-card.active-order{animation:pulse-ring 2.5s ease infinite;}

/* ===== SECTION HEADERS ===== */
.sec-header{display:flex;align-items:center;justify-content:space-between;padding:18px 16px 8px;}
.sec-header-left{display:flex;align-items:center;gap:8px;}
.sec-header-title{font-size:14px;font-weight:800;color:#3E2000;}
.sec-header-count{background:#FFF3E0;color:#FF8C00;font-size:11px;font-weight:800;padding:2px 9px;border-radius:10px;}
.sec-header-empty{font-size:12px;color:#CCC;padding:8px 16px 14px;}

/* ===== COMPACT HISTORY ROWS ===== */
.history-row{display:flex;align-items:center;gap:12px;padding:11px 16px;background:#fff;margin:0 16px 8px;border-radius:14px;box-shadow:0 1px 8px rgba(0,0,0,0.05);border:1px solid #F5EDE0;cursor:pointer;transition:background .15s;}
.history-row:active{background:#FFF8F0;}
.history-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.history-dot.done{background:#AB47BC;}
.history-dot.cancelled{background:#EF5350;}
.history-main{flex:1;min-width:0;}
.history-id{font-size:11px;font-weight:800;color:#FF8C00;letter-spacing:.3px;}
.history-items{font-size:12px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.history-right{text-align:right;flex-shrink:0;}
.history-price{font-size:14px;font-weight:800;color:#3E2000;}
.history-date{font-size:11px;color:#CCC;margin-top:1px;}

/* ===== EXPAND BUTTON ===== */
.show-more-btn{display:flex;align-items:center;justify-content:center;gap:6px;margin:4px 16px 16px;padding:11px;border-radius:14px;border:1.5px dashed #E8DDD0;background:transparent;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:700;color:#999;cursor:pointer;width:calc(100% - 32px);transition:all .2s;}
.show-more-btn:active{background:#FFF8F0;color:#FF8C00;}

/* ===== DETAIL EXPAND ===== */
.history-detail{display:none;padding:10px 16px 4px;border-top:1px solid #F5EDE0;}
.history-detail.open{display:block;}
.history-row.expanded{border-color:#FFD54F;}

.empty-state{text-align:center;padding:60px 30px;color:#CCC;}
/* ===== RATING POPUP ===== */
.rating-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:900;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.rating-overlay.show{opacity:1;pointer-events:all;}
.rating-sheet{background:#fff;width:100%;max-width:480px;border-radius:24px 24px 0 0;padding:24px 20px 40px;transform:translateY(100%);transition:transform .35s cubic-bezier(.34,1.56,.64,1);}
.rating-overlay.show .rating-sheet{transform:translateY(0);}
.rating-title{font-size:18px;font-weight:800;color:#3E2000;text-align:center;margin-bottom:4px;}
.rating-sub{font-size:13px;color:#999;text-align:center;margin-bottom:18px;}
.rating-item-name{font-size:14px;font-weight:700;color:#5D3A00;text-align:center;background:#FFF8E1;border-radius:10px;padding:8px 14px;margin-bottom:16px;}
.rating-food-img{width:90px;height:90px;border-radius:16px;object-fit:cover;margin:0 auto 14px;display:block;background:#F5EFE6;border:2px solid #FFE082;box-shadow:0 4px 14px rgba(255,193,7,0.2);}
.rating-food-emoji{width:90px;height:90px;border-radius:16px;background:#FFF8E1;border:2px solid #FFE082;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:42px;}
.stars-row{display:flex;justify-content:center;gap:10px;margin-bottom:20px;}
.star-btn{font-size:38px;cursor:pointer;transition:transform .15s,filter .15s;filter:grayscale(1);opacity:.4;}
.star-btn.lit{filter:grayscale(0);opacity:1;transform:scale(1.12);}
.star-btn:active{transform:scale(.9);}
.rating-comment{width:100%;border:1.5px solid #E8E8E8;border-radius:12px;padding:10px 14px;font-family:'Sarabun',sans-serif;font-size:14px;color:#2C2C2C;background:#FAFAFA;outline:none;resize:none;box-sizing:border-box;transition:border-color .2s;}
.rating-comment:focus{border-color:#FFC107;}
.rating-submit-btn{width:100%;margin-top:14px;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,#FFC107,#F5A623);font-family:'Sarabun',sans-serif;font-size:16px;font-weight:800;color:#3E2000;cursor:pointer;box-shadow:0 4px 14px rgba(255,193,7,.4);transition:opacity .2s;}
.rating-submit-btn:disabled{opacity:.4;cursor:not-allowed;}
.rating-skip{width:100%;margin-top:8px;padding:11px;border-radius:14px;border:none;background:transparent;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:700;color:#BBB;cursor:pointer;}
/* ===== STAR BADGE in history ===== */
.star-badge{display:inline-flex;align-items:center;gap:3px;background:#FFF8E1;border:1px solid #FFE082;color:#F5A623;font-size:11px;font-weight:800;padding:2px 7px;border-radius:8px;margin-left:6px;vertical-align:middle;}
.empty-icon{font-size:60px;opacity:.5;margin-bottom:14px;}
.empty-text{font-size:15px;font-weight:700;color:#BBB;}
.empty-sub{font-size:13px;color:#CCC;margin-top:6px;}
.empty-btn{display:inline-block;margin-top:20px;background:linear-gradient(135deg,#FFC107,#F5A623);color:#3E2000;font-weight:800;padding:13px 30px;border-radius:14px;text-decoration:none;font-size:15px;box-shadow:0 4px 14px rgba(255,193,7,0.4);}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;padding:10px 16px 18px;background:#fff;box-shadow:0 -3px 16px rgba(0,0,0,0.08);z-index:100;}
.order-btn-main{width:100%;padding:15px;border-radius:16px;border:none;background:linear-gradient(135deg,#FFC107,#F5A623);font-family:'Sarabun',sans-serif;font-size:16px;font-weight:800;color:#3E2000;cursor:pointer;box-shadow:0 4px 16px rgba(255,193,7,0.4);}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,0.85);display:flex;align-items:center;justify-content:center;z-index:999;opacity:0;pointer-events:none;transition:opacity .2s;}
.loading-overlay.show{opacity:1;pointer-events:all;}
.spinner{width:44px;height:44px;border-radius:50%;border:4px solid #FFE082;border-top-color:#F5A623;animation:spin .75s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);background:rgba(44,44,44,0.92);color:#fff;padding:10px 22px;border-radius:30px;font-size:13px;font-weight:600;opacity:0;transition:all .28s;z-index:600;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, onSnapshot, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const sess = sessionStorage.getItem('imkum_user');
if(!sess){ window.location.href='login.html'; throw new Error('no auth'); }
const user = JSON.parse(sess);
// ตรวจ session expiry 8 ชั่วโมง
if(user.loginAt && (Date.now() - user.loginAt > 8*60*60*1000)){
  sessionStorage.clear(); window.location.href='login.html'; throw new Error('session expired');
}
if(user.role==='admin'||user.role==='owner'){ window.location.href='admin.html'; throw new Error('wrong role'); }

const app = initializeApp({
  apiKey:"AIzaSyBJjzTASSDoezaH2lPTUP1Fn9jS6RR-OUo",
  authDomain:"im-oei.firebaseapp.com",
  projectId:"im-oei"
});
const db = getFirestore(app);

function showLoading(v){ document.getElementById('loading').classList.toggle('show',v); }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }

document.getElementById('user-name-display').textContent = user.name||'ลูกค้า';

// ฟอร์แมตเบอร์โทร: 0812345678 → 081-234-5678
function formatPhone(p){
  if(!p) return '-';
  const d = p.replace(/\D/g,'');
  if(d.length===10) return d.slice(0,3)+'-'+d.slice(3,6)+'-'+d.slice(6);
  return p;

function startOrdersRealtime() {
  if (!user.phone) return;
  const q = query(collection(db,'orders'), where('customerPhone','==', user.phone||''));

async function loadOrders(){
  showLoading(true);
  try {
    // PRIMARY: query by phone without orderBy (no index needed)
    const q=query(collection(db,'orders'),where('customerPhone','==',user.phone||''));
    const snap=await getDocs(q);
    const docs=snap.docs.map(d=>({id:d.id,...d.data()}));
    docs.sort((a,b)=>(b.createdAt?.toDate?.()?.getTime?.()??0)-(a.createdAt?.toDate?.()?.getTime?.()??0));
    renderOrders(docs);
  } catch(e){
    console.warn('primary query failed, trying fallback:', e);
    try {
      // FALLBACK: get all orders, filter in JS
      const snap=await getDocs(collection(db,'orders'));
      const docs=snap.docs.map(d=>({id:d.id,...d.data()}))
        .filter(o=>o.customerPhone===(user.phone||''));
      docs.sort((a,b)=>(b.createdAt?.toDate?.()?.getTime?.()??0)-(a.createdAt?.toDate?.()?.getTime?.()??0));
      renderOrders(docs);
    } catch(e2){
      document.getElementById('orders-wrap').innerHTML='<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">โหลดไม่ได้</div><div class="empty-sub">กรุณาลองใหม่อีกครั้ง</div></div>';

}

const VAPID_PUBLIC_KEY = 'BGZbGcsIuEzA5enjkAmik_kuZwvAsNGpsuEUj_p3TpJVaRSq0KnkxUlcthSnCT_rpZC4tg7eTQPq1v1FrArd3j0';

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = atob(base64);
  return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
}

async function subscribeToPush(swReg) {
  try {
    const sub = await swReg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
    });
    // บันทึก subscription ลง Firestore ผูกกับ phone
    const subData = sub.toJSON();
    const { setDoc, doc: fsDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    await setDoc(fsDoc(db, 'pushSubscriptions', user.phone), {
      phone: user.phone,
      name: user.name || '',
      subscription: subData,
      updatedAt: new Date().toISOString()
    }, { merge: true });
    console.log('✅ Push subscribed');
  } catch(e) {
    console.warn('Push subscribe failed:', e);
  }
}

function playCustSound(type) {
  if (!custSoundEnabled) return;
  try {
    if (!custAudioCtx) custAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = custAudioCtx;
    const freqs = type === 'ready' ? [700, 900, 1100] : [500, 650];
    freqs.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      const t = ctx.currentTime + i * 0.18;
      gain.gain.setValueAtTime(0.35, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      osc.start(t); osc.stop(t + 0.3);
    });
  } catch(e) {}
}

    });

      navigator.serviceWorker.controller.postMessage({

      });
    }
  }
}

function startWatchingOrders() {
  if (!user.phone) return;
  const q = query(collection(db,'orders'), where('customerPhone','==', user.phone));
  // real-time listener แทน polling
  onSnapshot(q, (snap) => {
    snap.docs.forEach(d => {
      const o = { id: d.id, ...d.data() };
      const prevStatus = watchedOrders[o.id];
      if (prevStatus && prevStatus !== o.status) {
        // status เปลี่ยน!
        handleStatusChange(o, prevStatus, o.status);
      }
      watchedOrders[o.id] = o.status;
    });
  }, (e) => { console.warn('onSnapshot error:', e); });
}

const statusTH = { pending:'รอรับ', preparing:'กำลังทำ', ready:'พร้อมรับ', done:'รับแล้ว', cancelled:'ยกเลิก' };

function handleStatusChange(order, oldStatus, newStatus) {
  const statusIcon = { pending:'🟡', preparing:'🔵', ready:'🟢', done:'✅', cancelled:'❌' };
  const icon = statusIcon[newStatus] || '📋';
  const statusName = statusTH[newStatus] || newStatus;
  let title = `${icon} ออเดอร์ #${order.id.slice(0,6).toUpperCase()}`;
  let body = `สถานะ: ${statusName}`;

  if (newStatus === 'ready') {
    title = '🟢 อาหารพร้อมแล้ว!';
    body = `มารับได้เลย ⏰ ${order.pickupTime || ''} น.`;
    playCustSound('ready');
  } else if (newStatus === 'preparing') {
    title = '🔵 ร้านกำลังทำอาหาร';
    body = 'ร้านรับออเดอร์แล้ว กำลังเตรียม!';
    playCustSound('update');
  } else if (newStatus === 'cancelled') {
    title = '❌ ออเดอร์ถูกยกเลิก';
    body = 'ออเดอร์ของคุณถูกยกเลิก';
    playCustSound('update');
  } else {
    playCustSound('update');
  }

  showCustBrowserNotif(title, body, 'order-' + order.id);
  showToast(`${icon} ${title}`);
  // onSnapshot จะอัพเดท list อัตโนมัติ — ไม่ต้อง loadOrders() อีก

  // ขึ้น rating popup เมื่อสถานะเป็น "รับแล้ว"
  if (newStatus === 'done') {
    setTimeout(() => openRatingPopup(order), 1200);
  }
}

  try {
    const snap = await getDocs(query(collection(db,'ratings'), where('phone','==',user.phone)));
    snap.docs.forEach(d => { _ratingsCache[d.id] = d.data(); });
    // re-render history rows ถ้ามีข้อมูลแล้ว
    if (allHistoryDocs && allHistoryDocs.length) renderHistoryRows(historyExpanded ? allHistoryDocs : allHistoryDocs.slice(0, HISTORY_PREVIEW));
  } catch(e) { console.warn('loadMyRatings:', e); }
}

function openRatingPopup(order) {
  const items = (order.items || []).filter(i => i.id);
  if (!items.length) return;
  _ratingOrder = order;
  _ratingItemList = items;
  _ratingItemIdx = 0;
  _selectedStar = 0;
  showRatingItem();
  document.getElementById('rating-overlay').classList.add('show');
}

function showRatingItem() {
  const item = _ratingItemList[_ratingItemIdx];
  if (!item) { closeRatingPopup(); return; }
  const alreadyRated = _ratingsCache[`${_ratingOrder.id}_${item.id}`];

  document.getElementById('rating-item-name').textContent = `${item.name}`;
  document.getElementById('rating-progress').textContent = `${_ratingItemIdx + 1} / ${_ratingItemList.length}`;
  document.getElementById('rating-comment').value = '';
  // แสดงรูปอาหาร
  const imgWrap = document.getElementById('rating-food-img-wrap');
  if (imgWrap) {
    if (item.imgUrl || item.photoURL || item.imageUrl) {
      imgWrap.innerHTML = `<img class="rating-food-img" src="${item.imgUrl||item.photoURL||item.imageUrl}" alt="${item.name}" onerror="this.parentElement.innerHTML='<div class=\\'rating-food-emoji\\'>🍽️</div>'">`;
    } else {
      imgWrap.innerHTML = `<div class="rating-food-emoji">🍽️</div>`;
    }
  }
  _selectedStar = alreadyRated ? alreadyRated.star : 0;
  updateStars(_selectedStar);
  document.getElementById('rating-submit-btn').disabled = _selectedStar === 0;
}

function updateStars(n) {
  document.querySelectorAll('.star-btn').forEach((btn, i) => {
    btn.classList.toggle('lit', i < n);
  });
  _selectedStar = n;
  document.getElementById('rating-submit-btn').disabled = n === 0;
}

window.clickStar = function(n) { updateStars(n); };

window.submitRating = async function() {
  if (_selectedStar === 0) return;
  const item = _ratingItemList[_ratingItemIdx];
  const comment = document.getElementById('rating-comment').value.trim();
  const ratingKey = `${_ratingOrder.id}_${item.id}`;
  try {
    await setDoc(doc(db, 'ratings', ratingKey), {
      orderId: _ratingOrder.id,
      itemId: item.id,
      itemName: item.name,
      star: _selectedStar,
      comment,
      phone: user.phone || '',
      customerName: user.name || '',
      createdAt: serverTimestamp()
    });
    _ratingsCache[ratingKey] = { star: _selectedStar, comment, itemName: item.name };
    showToast(`⭐ ขอบคุณที่รีวิว "${item.name}"!`);
  } catch(e) { console.warn('submitRating:', e); showToast('❌ บันทึกรีวิวไม่ได้'); }

  // ไปรายการถัดไป
  _ratingItemIdx++;
  if (_ratingItemIdx < _ratingItemList.length) {
    _selectedStar = 0;
    showRatingItem();
  } else {
    closeRatingPopup();
    // refresh history badges
    if (allHistoryDocs && allHistoryDocs.length) renderHistoryRows(historyExpanded ? allHistoryDocs : allHistoryDocs.slice(0, HISTORY_PREVIEW));
  }
};

window.skipRating = function() {
  _ratingItemIdx++;
  if (_ratingItemIdx < _ratingItemList.length) { _selectedStar = 0; showRatingItem(); }
  else closeRatingPopup();
};

function closeRatingPopup() {
  document.getElementById('rating-overlay').classList.remove('show');
  _ratingOrder = null;
}
window.openRatingPopup = openRatingPopup;

// เริ่มระบบ
initCustomerNotifications();
loadMyRatings();

</script>

<!-- ===== RATING POPUP ===== -->
<div class="rating-overlay" id="rating-overlay">
  <div class="rating-sheet">
    <div class="rating-title">⭐ รีวิวอาหาร</div>
    <div class="rating-sub" id="rating-progress">1 / 1</div>
    <div id="rating-food-img-wrap"><div class="rating-food-emoji">🍽️</div></div>
    <div class="rating-item-name" id="rating-item-name"></div>
    <div class="stars-row">
      <span class="star-btn" onclick="clickStar(1)">⭐</span>
      <span class="star-btn" onclick="clickStar(2)">⭐</span>
      <span class="star-btn" onclick="clickStar(3)">⭐</span>
      <span class="star-btn" onclick="clickStar(4)">⭐</span>
      <span class="star-btn" onclick="clickStar(5)">⭐</span>
    </div>
    <textarea class="rating-comment" id="rating-comment" rows="3" placeholder="ความคิดเห็น (ไม่บังคับ)..."></textarea>

</div>
