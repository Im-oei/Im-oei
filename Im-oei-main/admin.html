<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IM-OEI Audit Dashboard PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f4f6f9;
  transition: 0.3s;
}
.dark {
  background: #1e272e;
  color: #d2dae2;
}

/* HEADER */
.header {
  background: linear-gradient(135deg, #4b7bec, #3867d6);
  color: white;
  padding: 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.logo {
  width: 45px;
}
.title {
  font-size: 20px;
  font-weight: bold;
}

/* BUTTON */
.btn {
  background: white;
  border: none;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
}

/* CONTAINER */
.container {
  padding: 20px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

/* CARD */
.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.05);
}
.dark .card {
  background: #2f3640;
}

.critical { border-left: 6px solid #e74c3c; }
.warning { border-left: 6px solid #f1c40f; }
.ok { border-left: 6px solid #2ecc71; }

/* FILTER */
.filter {
  margin-bottom: 15px;
}

select {
  padding: 6px;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 20px;
  color: #888;
}
</style>
</head>

<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:10px;">
    <img class="logo" src="https://cdn-icons-png.flaticon.com/512/1055/1055687.png">
    <div class="title">IM-OEI Audit Dashboard PRO</div>
  </div>

  <div>
    <button class="btn" onclick="toggleDark()">🌙 Dark</button>
    <button class="btn" onclick="window.print()">📄 Export PDF</button>
  </div>
</div>

<div class="container">

  <!-- SCORE -->
  <div class="grid">
    <div class="card">
      <h3>Security Score</h3>
      <h1 style="color:#e74c3c;">45%</h1>
    </div>

    <div class="card">
      <canvas id="chart"></canvas>
    </div>
  </div>

  <!-- FILTER -->
  <div class="filter">
    Filter:
    <select onchange="filterCard(this.value)">
      <option value="all">All</option>
      <option value="critical">Critical</option>
      <option value="warning">Warning</option>
      <option value="ok">OK</option>
    </select>
  </div>

  <!-- ISSUES -->
  <div id="issues">

    <div class="card critical">
      <h2>🚨 Firestore Security</h2>
      <p>allow write: if true</p>
    </div>

    <div class="card warning">
      <h2>⚠️ LIFF Config</h2>
      <p>ยังไม่ใส่ LIFF ID</p>
    </div>

    <div class="card warning">
      <h2>⚠️ Firebase Auth Missing</h2>
    </div>

    <div class="card warning">
      <h2>⚠️ Duplicate Structure</h2>
    </div>

    <div class="card warning">
      <h2>⚠️ Admin Event Bug</h2>
    </div>

    <div class="card ok">
      <h2>✅ UI/UX</h2>
    </div>

  </div>

</div>

<div class="footer">
  © 2026 IM-OEI | Audit Report
</div>

<script>
/* CHART */
new Chart(document.getElementById('chart'), {
  type: 'doughnut',
  data: {
    labels: ['Critical','Warning','OK'],
    datasets: [{
      data: [1,4,1]
    }]
  }
});

/* DARK MODE */
function toggleDark() {
  document.body.classList.toggle("dark");
}

/* FILTER */
function filterCard(type) {
  let cards = document.querySelectorAll("#issues .card");
  cards.forEach(c => {
    if(type === "all") {
      c.style.display = "block";
    } else {
      c.style.display = c.classList.contains(type) ? "block" : "none";
    }
  });
}
</script>

</body>
</html>
