<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>อิ่มเอ๋ย Im-Oei</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="success">
  <div class="success-confetti">🎉 🎊 🎉</div>

  <!-- LOGO -->
  <div style="margin-bottom:12px;animation:fadeDown 0.5s ease-out;">
    <img src="logo.png" alt="อิ่มเอ๋ย"
      style="width:72px;height:72px;border-radius:50%;object-fit:cover;border:3px solid #FFC107;box-shadow:0 4px 18px rgba(255,193,7,0.35);"
      onerror="this.style.display='none'">
  </div>

  <div class="success-check">✓</div>
  <h2>สั่งซื้อสำเร็จ!</h2>
  <p>ขอบคุณที่อุดหนุนนะคะ 😊</p>

  <div class="order-summary-card">
    <div class="summary-row"><span class="key">เลขที่ออเดอร์</span><span class="val" id="s-id">-</span></div>
    <div class="summary-row"><span class="key">ชื่อผู้สั่ง</span><span class="val" id="s-name">-</span></div>
    <div class="summary-row"><span class="key">เวลารับอาหาร</span><span class="val" id="s-time">07:30 น.</span></div>
    <div class="summary-row" id="s-location-row" style="display:none"><span class="key">📍 จุดรับอาหาร</span><span class="val" id="s-location" style="color:#1565C0;font-weight:800">-</span></div>
    <div class="summary-row" id="s-date-row"><span class="key">วันที่สั่ง</span><span class="val" id="s-date">-</span></div>
    <div class="summary-row"><span class="key">ยอดรวม</span><span class="val orange" id="s-total">0 บาท</span></div>
  </div>

  <!-- STAMP EARN -->
  <div id="stamp-msg-box" style="display:none;background:linear-gradient(135deg,#FF6B35,#FF8C00);border-radius:14px;padding:14px 16px;margin:14px 0;color:#fff;font-weight:700;font-size:14px;text-align:center"></div>

  <!-- PREORDER NOTICE -->
  <div id="preorder-notice" style="display:none;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:14px;padding:12px 16px;margin:10px 0;color:#fff;font-size:13px;font-weight:700;text-align:center"></div>

  <p class="success-note">เราจะเตรียมอาหารให้พร้อม<br>รอรับได้ตามเวลาที่เลือกไว้เลยค่ะ</p>

  <div class="success-btns">
    <a class="btn-primary" href="index.html">กลับหน้าหลัก</a>
    <a class="btn-secondary" href="index.html">สั่งเพิ่มอีก</a>
  </div>
</div>

<script>
const order = JSON.parse(localStorage.getItem('imkum_last_order') || '{}');
const now = new Date();
document.getElementById('s-id').textContent = order.orderId ? '#' + order.orderId.slice(0,8).toUpperCase() : '#??????';
document.getElementById('s-name').textContent = 'คุณ ' + (order.customerName || '-');
document.getElementById('s-time').textContent = (order.pickupTime || '07:30') + ' น.';
document.getElementById('s-total').textContent = (order.total || 0) + ' บาท';

// Pickup location
if (order.pickupLocationName) {
  document.getElementById('s-location-row').style.display = '';
  document.getElementById('s-location').textContent = order.pickupLocationName;
}

// Preorder
if (order.isPreorder) {
  const preBox = document.getElementById('preorder-notice');
  preBox.style.display = 'block';
  const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate()+1);
  const tStr = tomorrow.toLocaleDateString('th-TH',{weekday:'long',day:'numeric',month:'long'});
  preBox.textContent = '📅 ออเดอร์นี้สั่งล่วงหน้า รับได้วัน' + tStr;
  document.getElementById('s-date').textContent = 'วัน'+tStr;
} else {
  document.getElementById('s-date').textContent = now.toLocaleDateString('th-TH', {year:'numeric',month:'long',day:'numeric'}) + ' ' + now.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}) + ' น.';
}

// Stamp
if (order.stampMsg) {
  const stampBox = document.getElementById('stamp-msg-box');
  stampBox.style.display = 'block';
  stampBox.textContent = order.stampMsg;
}
</script>
</body>
</html>
