<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>อิ่มอิ่ม ทุกเช้า</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.banner-img-wrap { margin: 0 16px 6px; border-radius: 18px; overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
.banner-img-wrap img { width: 100%; height: 160px; object-fit: cover; display: block; }
.closed-overlay { background: #f44336; color: #fff; text-align: center; padding: 14px 16px; margin: 10px 16px; border-radius: 14px; font-weight: 700; font-size: 15px; }
.skeleton { background: linear-gradient(90deg, #f0e8d8 25%, #fff8e1 50%, #f0e8d8 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 14px; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.skel-card { height: 70px; margin: 6px 16px; }
.skel-featured { height: 160px; width: 132px; flex-shrink: 0; }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-top">
    <span class="hero-logo">IM-OEI</span>
    <div class="hero-icons">⚡ 🔔</div>
  </div>
  <div class="hero-mascot">🧑‍🍳</div>
  <div class="hero-brand">
    <h1>อิ่มอิ่ม<span class="big">ทุกเช้า</span></h1>
    <p>อร่อย สดใหม่ ทุกเช้า</p>
  </div>
  <div class="hero-spacer"></div>
</div>

<div id="closed-banner" style="display:none"></div>

<div class="order-time-banner" id="time-banner">
  <span class="clock-icon">🕐</span>
  <div class="time-text">
    <strong id="cutoff-text">รับออเดอร์ถึง 06:30 น.</strong>
    <span id="pickup-text">รับอาหาร 07:00 - 08:00 น.</span>
  </div>
</div>

<div id="banner-section"></div>

<div class="section-title"><span class="icon">🔥</span><span>เมนูแนะนำ</span></div>
<div class="featured-row" id="featured-row">
  <div class="skeleton skel-featured"></div>
  <div class="skeleton skel-featured"></div>
  <div class="skeleton skel-featured"></div>
</div>

<div id="menu-list" class="pb-footer">
  <div class="skeleton skel-card"></div>
  <div class="skeleton skel-card"></div>
  <div class="skeleton skel-card"></div>
  <div class="skeleton skel-card"></div>
</div>

<div class="footer">
  <div class="cart-summary" onclick="location.href='cart.html'">
    <div class="cart-icon-wrap">
      <span class="cart-emoji">🛒</span>
      <div class="cart-badge" id="cart-count">0</div>
    </div>
    <div class="cart-amount">
      <strong id="home-total">0 บาท</strong>
      <span>ดูรายการ</span>
    </div>
  </div>
  <button class="order-btn" id="order-btn" onclick="location.href='cart.html'" disabled>สั่งซื้อ</button>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyBJjzTASSDoezaH2lPTUP1Fn9jS6RR-OUo",
  authDomain: "im-oei.firebaseapp.com",
  projectId: "im-oei"
});
const db = getFirestore(app);

async function loadAndRender() {
  try {
    // Load store settings
    const settingsDoc = await getDoc(doc(db, 'settings', 'store'));
    if (settingsDoc.exists()) {
      const s = settingsDoc.data();
      STORE_SETTINGS = { ...STORE_SETTINGS, ...s };
      document.getElementById('cutoff-text').textContent = `รับออเดอร์ถึง ${s.orderCutoff || '06:30'} น.`;
      document.getElementById('pickup-text').textContent = `รับอาหาร ${s.pickupStart || '07:00'} - ${s.pickupEnd || '08:00'} น.`;
      if (s.bannerUrl) {
        document.getElementById('banner-section').innerHTML = `<div class="banner-img-wrap"><img src="${s.bannerUrl}" alt="banner"></div>`;
      }
      if (s.isOpen === false) {
        document.getElementById('closed-banner').style.display = 'block';
        document.getElementById('closed-banner').innerHTML = `<div class="closed-overlay">🔴 ร้านปิดรับออเดอร์แล้ว กรุณามาใหม่วันพรุ่งนี้</div>`;
        document.getElementById('order-btn').disabled = true;
        document.getElementById('order-btn').textContent = 'ปิดรับออเดอร์';
      }
      if (s.featuredIds) FEATURED_IDS = s.featuredIds;
    }

    // Load menu from Firestore
    const menuSnapshot = await getDocs(collection(db, 'menu'));
    if (!menuSnapshot.empty) {
      // Build menu from Firestore docs
      const categories = {};
      menuSnapshot.forEach(d => {
        const data = { id: d.id, ...d.data() };
        if (data.hidden) return;
        const catKey = data.catKey || 'other';
        if (!categories[catKey]) {
          categories[catKey] = { category: data.category || catKey, catKey, price: data.price || 0, items: [] };
        }
        categories[catKey].items.push(data);
      });
      MENU = Object.values(categories).sort((a,b) => (a.sortOrder||99) - (b.sortOrder||99));
    } else {
      // Seed default menu
      MENU = DEFAULT_MENU;
    }

    ALL_ITEMS = MENU.flatMap(c => c.items);
    buildFeatured();
    buildMenuList();
    render();
  } catch (e) {
    console.error('Firestore error, using local fallback', e);
    MENU = DEFAULT_MENU;
    ALL_ITEMS = MENU.flatMap(c => c.items);
    buildFeatured();
    buildMenuList();
    render();
  }
}

function buildFeatured() {
  const featRow = document.getElementById('featured-row');
  featRow.innerHTML = '';
  FEATURED_IDS.forEach(fid => {
    const item = ALL_ITEMS.find(i => i.id === fid);
    if (!item || item.hidden) return;
    featRow.innerHTML += `
      <div class="featured-card">
        <div class="badge">BEST</div>
        <div class="fc-img">${renderFoodImg(item)}</div>
        <div class="fc-info">
          <div class="fc-name">${item.name}</div>
          <div class="fc-price">${item.price} บาท</div>
        </div>
        <button class="fc-add" onclick="add('${item.id}')">+</button>
      </div>`;
  });
  if (!featRow.innerHTML) featRow.style.display = 'none';
}

function buildMenuList() {
  const menuList = document.getElementById('menu-list');
  menuList.innerHTML = '';
  MENU.forEach(cat => {
    if (!cat.items.length) return;
    menuList.innerHTML += `<div class="cat-header"><span class="cat-name">${cat.category}</span><span class="cat-price">(${cat.price} บาท)</span></div>`;
    cat.items.forEach(item => {
      if (item.hidden) return;
      menuList.innerHTML += `
        <div class="card">
          <div class="food-img">${renderFoodImg(item)}</div>
          <div class="left">
            <div class="name">${item.name}</div>
            <div class="desc">${item.desc || ''}</div>
          </div>
          <div class="qty">
            <button class="btn" onclick="remove('${item.id}')">−</button>
            <span class="qty-num" id="qty-${item.id}">0</span>
            <button class="btn plus" onclick="add('${item.id}')">+</button>
          </div>
        </div>`;
    });
  });
}

loadAndRender();
</script>
</body>
</html>
