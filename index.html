<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>อิ่มอิ่ม ทุกเช้า</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f2f2f2;
}

/* HEADER */
.header{
  background:#ffc107;
  padding:20px;
  text-align:center;
  font-weight:bold;
  font-size:22px;
}

/* CARD */
.card{
  background:#fff;
  margin:15px;
  padding:15px;
  border-radius:15px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img{
  width:70px;
  height:70px;
  border-radius:10px;
  object-fit:cover;
}

.info{
  flex:1;
  margin-left:10px;
}

.qty{
  display:flex;
  align-items:center;
  gap:10px;
}

.btn{
  width:30px;
  height:30px;
  border:none;
  border-radius:50%;
  background:#ffc107;
  font-size:18px;
}

/* FOOTER */
.footer{
  position:fixed;
  bottom:0;
  width:100%;
  background:#ffc107;
  display:flex;
  justify-content:space-between;
  padding:15px;
  font-weight:bold;
}

/* PAGE */
.page{
  display:none;
}
.active{
  display:block;
}

/* SUCCESS */
.success{
  text-align:center;
  padding:50px;
}
.success h1{
  color:green;
}
</style>
</head>

<body>

<div class="header">อิ่มอิ่ม ทุกเช้า</div>

<!-- หน้า MENU -->
<div id="menu" class="page active">

<div class="card">
<img src="https://picsum.photos/100">
<div class="info">
  <b>แซนวิช</b><br>
  20 บาท
</div>
<div class="qty">
  <button class="btn" onclick="change('sandwich',20,-1)">-</button>
  <span id="sandwich">0</span>
  <button class="btn" onclick="change('sandwich',20,1)">+</button>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/101">
<div class="info">
  <b>ข้าว</b><br>
  50 บาท
</div>
<div class="qty">
  <button class="btn" onclick="change('rice',50,-1)">-</button>
  <span id="rice">0</span>
  <button class="btn" onclick="change('rice',50,1)">+</button>
</div>
</div>

</div>

<!-- หน้า CART -->
<div id="cart" class="page">
<div style="padding:20px">
<h2>ตะกร้า</h2>
<div id="cartList"></div>
</div>
</div>

<!-- SUCCESS -->
<div id="success" class="page success">
<h1>✔ สั่งซื้อสำเร็จ</h1>
<p id="orderId"></p>
<button onclick="goHome()">กลับหน้าหลัก</button>
</div>

<!-- FOOTER -->
<div class="footer">
<span id="total">0 บาท</span>
<div>
<button onclick="openCart()">ตะกร้า</button>
<button onclick="checkout()">สั่งซื้อ</button>
</div>
</div>

<script>
let cart = {
  sandwich:0,
  rice:0
};

let prices = {
  sandwich:20,
  rice:50
};

function change(name, price, amount){
  cart[name] += amount;
  if(cart[name] < 0) cart[name]=0;

  document.getElementById(name).innerText = cart[name];
  updateTotal();
}

function updateTotal(){
  let total = 0;
  for(let k in cart){
    total += cart[k] * prices[k];
  }
  document.getElementById("total").innerText = total + " บาท";
}

function openCart(){
  document.getElementById("menu").classList.remove("active");
  document.getElementById("cart").classList.add("active");

  let html="";
  for(let k in cart){
    if(cart[k]>0){
      html += k + " x" + cart[k] + "<br>";
    }
  }
  document.getElementById("cartList").innerHTML = html || "ไม่มีสินค้า";
}

function checkout(){
  document.getElementById("menu").classList.remove("active");
  document.getElementById("cart").classList.remove("active");
  document.getElementById("success").classList.add("active");

  let id = "OD" + Math.floor(Math.random()*1000000000);
  document.getElementById("orderId").innerText = id;
}

function goHome(){
  document.getElementById("success").classList.remove("active");
  document.getElementById("menu").classList.add("active");
}
</script>

</body>
</html>
