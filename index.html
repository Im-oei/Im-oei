<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Im Oei</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#fff;
}

/* HEADER */
.header{
  background:#facc15;
  padding:20px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

/* MENU */
.menu{
  padding:15px;
}

.card{
  display:flex;
  gap:10px;
  background:#fff;
  border-radius:15px;
  padding:10px;
  margin-bottom:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card img{
  width:80px;
  height:80px;
  border-radius:10px;
  object-fit:cover;
}

.info{flex:1;}

.qty{
  display:flex;
  align-items:center;
  gap:5px;
}

.qty button{
  width:30px;
  height:30px;
  border:none;
  border-radius:50%;
  background:#facc15;
}

/* CART BAR */
.cart-bar{
  position:fixed;
  bottom:0;
  width:100%;
  background:#facc15;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

/* FULL CART */
.cart-page{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#fff;
  display:none;
  padding:20px;
}

/* SUCCESS */
.success{
  display:none;
  text-align:center;
  padding:50px;
}
</style>
</head>

<body>

<div class="header">อิ่มอิ่ม ทุกเช้า</div>

<div class="menu" id="menu"></div>

<div class="cart-bar" onclick="openCart()">
  <div id="sum">0 บาท</div>
  <button>สั่งซื้อ</button>
</div>
<!-- PAGE: MENU -->
<div id="page-menu">

  <div class="header">อิ่มอิ่ม ทุกเช้า</div>

  <div class="menu">
    <div class="card">
      <img src="https://picsum.photos/100">
      <div>
        <h3>แซนวิช</h3>
        <p>20 บาท</p>
        <button onclick="add('แซนวิช')">+</button>
      </div>
    </div>

    <div class="card">
      <img src="https://picsum.photos/101">
      <div>
        <h3>ข้าว</h3>
        <p>50 บาท</p>
        <button onclick="add('ข้าว')">+</button>
      </div>
    </div>
  </div>

  <div class="footer">
    <span id="total">0 บาท</span>
    <button onclick="goCart()">สั่งซื้อ</button>
  </div>

</div>


<!-- PAGE: CART -->
<div id="page-cart" style="display:none">

  <div class="header">ตะกร้า</div>

  <div class="menu" id="cart-list"></div>

  <div class="footer">
    <button onclick="confirmOrder()">ยืนยัน</button>
  </div>

</div>


<!-- PAGE: SUCCESS -->
<div id="page-success" style="display:none; text-align:center; margin-top:100px">

  <h1>✅</h1>
  <h2>สั่งซื้อสำเร็จ</h2>
  <p id="order-id"></p>

</div>
<!-- CART -->
<div class="cart-page" id="cartPage">
  <h2>ตะกร้า</h2>
  <div id="cart"></div>
  <button onclick="checkout()">ยืนยัน</button>
</div>

<!-- SUCCESS -->
<div class="success" id="success">
  <h1>✅</h1>
  <h2>สั่งซื้อสำเร็จ</h2>
  <div id="orderId"></div>
</div>
<script>
let cart = {}

function add(name){
  cart[name] = (cart[name] || 0) + 1
  updateTotal()
}

function updateTotal(){
  let total = Object.values(cart).reduce((a,b)=>a+b,0)
  document.getElementById("total").innerText = total + " บาท"
}

function goCart(){
  document.getElementById("page-menu").style.display = "none"
  document.getElementById("page-cart").style.display = "block"

  let html = ""
  for(let k in cart){
    html += `<div class="card">${k} x ${cart[k]}</div>`
  }
  document.getElementById("cart-list").innerHTML = html
}

function confirmOrder(){
  document.getElementById("page-cart").style.display = "none"
  document.getElementById("page-success").style.display = "block"

  let id = "OD" + Date.now()
  document.getElementById("order-id").innerText = id
}
                          </script>
<script>
let menu=[
 {name:"แซนวิช",price:20,img:"https://picsum.photos/100"},
 {name:"ข้าว",price:50,img:"https://picsum.photos/101"}
];

let cart=[];

function renderMenu(){
 document.getElementById("menu").innerHTML=
 menu.map((m,i)=>`
 <div class="card">
  <img src="${m.img}">
  <div class="info">
    <h4>${m.name}</h4>
    <p>${m.price} บาท</p>
    <div class="qty">
      <button onclick="add(${i})">+</button>
    </div>
  </div>
 </div>
 `).join("");
}

function add(i){
 let m=menu[i];
 let f=cart.find(x=>x.name===m.name);
 if(f) f.qty++;
 else cart.push({...m,qty:1});
 renderCart();
}

function renderCart(){
 let total=0;
 document.getElementById("cart").innerHTML=
 cart.map(c=>{
  total+=c.price*c.qty;
  return c.name+" x"+c.qty+"<br>";
 }).join("");
 document.getElementById("sum").innerText=total+" บาท";
}

function openCart(){
 document.getElementById("cartPage").style.display="block";
}

function checkout(){
 let id="OD"+Date.now();
 document.getElementById("orderId").innerText=id;
 document.getElementById("success").style.display="block";
 document.getElementById("cartPage").style.display="none";
 cart=[];
 renderCart();
}

renderMenu();
</script>

</body>
</html>
