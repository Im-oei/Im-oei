<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>อิ่มอิ่ม ทุกเช้า</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.banner-img-wrap { margin: 0 16px 6px; border-radius: 18px; overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
.banner-img-wrap img { width: 100%; height: 160px; object-fit: cover; display: block; }
.closed-overlay { background: #f44336; color: #fff; text-align: center; padding: 14px 16px; margin: 10px 16px; border-radius: 14px; font-weight: 700; font-size: 15px; }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-top">
    <span class="hero-logo">IM-OEI</span>
    <div class="hero-icons">
      <button id="admin-fab" onclick="openAdminLogin()" title="แอดมิน" style="
        background:rgba(255,255,255,0.15);
        border:none;cursor:pointer;border-radius:50%;
        width:36px;height:36px;font-size:18px;
        display:flex;align-items:center;justify-content:center;
        backdrop-filter:blur(4px);transition:background 0.2s;
      ">🧑‍🍳</button>
    </div>
  </div>
  <div class="hero-mascot">🧑‍🍳</div>
  <div class="hero-brand">
    <h1>อิ่มอิ่ม<span class="big">ทุกเช้า</span></h1>
    <p>อร่อย สดใหม่ ทุกเช้า</p>
  </div>
  <div class="hero-spacer"></div>
</div>

<div id="closed-banner" style="display:none"></div>

<div class="order-time-banner">
  <span class="clock-icon">🕐</span>
  <div class="time-text">
    <strong id="cutoff-text">รับออเดอร์ถึง 06:30 น.</strong>
    <span id="pickup-text">รับอาหาร 07:00 - 08:00 น.</span>
  </div>
</div>

<div id="banner-section"></div>

<div class="section-title"><span class="icon">🔥</span><span>เมนูแนะนำ</span></div>
<div class="featured-row" id="featured-row"></div>

<div id="menu-list" class="pb-footer"></div>

<div class="footer">
  <div class="cart-summary" onclick="location.href='cart.html'">
    <div class="cart-icon-wrap">
      <span class="cart-emoji">🛒</span>
      <div class="cart-badge" id="cart-count">0</div>
    </div>
    <div class="cart-amount">
      <strong id="home-total">0 บาท</strong>
      <span>ดูรายการ</span>
    </div>
  </div>
  <button class="order-btn" id="order-btn" onclick="location.href='cart.html'" disabled>สั่งซื้อ</button>
</div>

<div class="toast" id="toast"></div>

<!-- ====== ADMIN LOGIN MODAL ====== -->
<div id="admin-modal" onclick="if(event.target===this)closeAdminModal()" style="
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);
  z-index:800;align-items:flex-end;justify-content:center;
">
  <div style="
    background:#fff;width:100%;max-width:540px;
    border-radius:24px 24px 0 0;padding:28px 24px 44px;
    font-family:'Sarabun',sans-serif;
    animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
  ">
    <div style="text-align:center;margin-bottom:20px">
      <div style="font-size:40px;margin-bottom:8px">🧑‍🍳</div>
      <div style="font-size:20px;font-weight:800;color:#2C2C2C">เข้าสู่ระบบแอดมิน</div>
      <div style="font-size:13px;color:#999;margin-top:4px">กรุณากรอกรหัสผ่านเพื่อดำเนินการต่อ</div>
    </div>

    <div style="position:relative;margin-bottom:16px">
      <input id="admin-pwd-input" type="password" placeholder="รหัสผ่าน" 
        onkeydown="if(event.key==='Enter')doAdminLogin()"
        style="
          width:100%;border:2px solid #E8E8E8;border-radius:14px;
          padding:14px 48px 14px 16px;font-family:'Sarabun',sans-serif;
          font-size:16px;color:#2C2C2C;outline:none;box-sizing:border-box;
          transition:border-color 0.2s;
        "
        onfocus="this.style.borderColor='#FFC107'"
        onblur="this.style.borderColor='#E8E8E8'"
      >
      <button onclick="togglePwd()" style="
        position:absolute;right:14px;top:50%;transform:translateY(-50%);
        background:none;border:none;cursor:pointer;font-size:20px;padding:0;
      " id="pwd-eye">👁️</button>
    </div>

    <div id="admin-error" style="
      display:none;background:#FFEBEE;color:#B71C1C;
      border-radius:10px;padding:10px 14px;font-size:13px;
      font-weight:700;margin-bottom:14px;text-align:center;
    ">❌ รหัสผ่านไม่ถูกต้อง</div>

    <button onclick="doAdminLogin()" style="
      width:100%;padding:15px;border-radius:14px;border:none;
      background:linear-gradient(135deg,#FFC107,#F5A623);
      font-family:'Sarabun',sans-serif;font-size:16px;font-weight:800;
      color:#3E2000;cursor:pointer;
      box-shadow:0 4px 14px rgba(255,193,7,0.4);
      transition:transform 0.15s;margin-bottom:10px;
    " onmousedown="this.style.transform='scale(0.97)'" onmouseup="this.style.transform='scale(1)'">
      🔑 เข้าสู่ระบบแอดมิน
    </button>
    <button onclick="closeAdminModal()" style="
      width:100%;padding:12px;border-radius:14px;border:none;
      background:#F5F5F5;font-family:'Sarabun',sans-serif;
      font-size:14px;font-weight:700;color:#999;cursor:pointer;
    ">ยกเลิก</button>
  </div>
</div>

<style>
@keyframes slideUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}
</style>

<script>
// ===== MENU DATA =====
var MENU = [
  { category:"🥪 แซนวิช", catKey:"sandwich", price:20, items:[
    { id:"tuna",         name:"ปูอัดทูน่า",     desc:"ปูอัด, ทูน่า, ผักสลัด",        emoji:"🥪", price:20 },
    { id:"pork_salad",   name:"หมูหยองสลัด",    desc:"หมูหยอง, สลัด, มายองเนส",      emoji:"🥙", price:20 },
    { id:"egg_sausage",  name:"ไข่ดาวไส้กรอก",  desc:"ไข่ดาว, ไส้กรอก, ซอส",         emoji:"🍳", price:20 },
    { id:"shrimp",       name:"ไข่กุ้งสาหร่าย", desc:"ไข่กุ้ง, สาหร่าย, มายองเนส",  emoji:"🍤", price:20 },
  ]},
  { category:"🍚 ข้าว", catKey:"rice", price:50, items:[
    { id:"chicken_rice",  name:"ข้าวไก่อบ",      desc:"ไก่อบ, ไข่ต้ม, ผัก",   emoji:"🍗", price:50 },
    { id:"chicken_lime",  name:"ข้าวไก่อบมะนาว", desc:"ไก่มะนาว, ข้าว, ผัก",  emoji:"🍋", price:50 },
  ]},
  { category:"🍜 หมี่", catKey:"noodle", price:50, items:[
    { id:"chicken_noodle", name:"หมี่ไก่ฉีก", desc:"หมี่เหลือง, ไก่ฉีก, น้ำซุป", emoji:"🍜", price:50 },
    { id:"pork_noodle",    name:"หมี่หมูแดง", desc:"หมี่, หมูแดง, ไข่ต้ม",        emoji:"🥢", price:50 },
  ]}
];
var ALL_ITEMS = [].concat.apply([], MENU.map(function(c){ return c.items; }));
var FEATURED_IDS = ["tuna","chicken_noodle","egg_sausage"];

// ===== CART =====
var cart = JSON.parse(localStorage.getItem('imkum_cart') || '{}');
function saveCart(){ localStorage.setItem('imkum_cart', JSON.stringify(cart)); }

function add(id){
  var item = ALL_ITEMS.filter(function(i){ return i.id===id; })[0];
  if(!item) return;
  cart[id] = (cart[id]||0)+1;
  saveCart(); render();
  showToast('เพิ่มลงตะกร้าแล้ว 🛒');
}
function remove(id){
  if((cart[id]||0)>0){ cart[id]--; if(!cart[id]) delete cart[id]; saveCart(); render(); }
}
function getTotal(){
  var sum=0;
  Object.keys(cart).forEach(function(id){
    var item=ALL_ITEMS.filter(function(i){ return i.id===id; })[0];
    if(item) sum+=item.price*cart[id];
  });
  return sum;
}
function getCount(){ var s=0; Object.values(cart).forEach(function(v){ s+=v; }); return s; }

function render(){
  ALL_ITEMS.forEach(function(item){
    var el=document.getElementById('qty-'+item.id);
    if(el) el.textContent=cart[item.id]||0;
  });
  var total=getTotal(), count=getCount();
  var totalEl=document.getElementById('home-total');
  var countEl=document.getElementById('cart-count');
  var btn=document.getElementById('order-btn');
  if(totalEl) totalEl.textContent=total+' บาท';
  if(countEl) countEl.textContent=count;
  if(btn && !btn.dataset.closed) btn.disabled=count===0;
}

function showToast(msg){
  var t=document.getElementById('toast');
  if(!t) return;
  t.textContent=msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); },2200);
}

// ===== ADMIN LOGIN =====
function openAdminLogin(){
  var m=document.getElementById('admin-modal');
  m.style.display='flex';
  setTimeout(function(){ document.getElementById('admin-pwd-input').focus(); },100);
  document.getElementById('admin-error').style.display='none';
  document.getElementById('admin-pwd-input').value='';
}
function closeAdminModal(){
  document.getElementById('admin-modal').style.display='none';
}
function togglePwd(){
  var inp=document.getElementById('admin-pwd-input');
  var eye=document.getElementById('pwd-eye');
  if(inp.type==='password'){ inp.type='text'; eye.textContent='🙈'; }
  else { inp.type='password'; eye.textContent='👁️'; }
}
function doAdminLogin(){
  var pwd=document.getElementById('admin-pwd-input').value;
  var correct=localStorage.getItem('imkum_admin_pwd')||'admin1234';
  if(pwd===correct){
    sessionStorage.setItem('imkum_admin_auth','1');
    window.location.href='admin.html';
  } else {
    document.getElementById('admin-error').style.display='block';
    document.getElementById('admin-pwd-input').value='';
    document.getElementById('admin-pwd-input').focus();
    setTimeout(function(){ document.getElementById('admin-error').style.display='none'; },2500);
  }
}
window.openAdminLogin=openAdminLogin;
window.closeAdminModal=closeAdminModal;
window.togglePwd=togglePwd;
window.doAdminLogin=doAdminLogin;

function foodImg(item){
  if(item.imageUrl) return '<img src="'+item.imageUrl+'" alt="'+item.name+'" loading="lazy" style="width:100%;height:100%;object-fit:cover;border-radius:inherit">';
  return item.emoji||'🍽️';
}

function buildFeatured(){
  var row=document.getElementById('featured-row');
  row.innerHTML='';
  FEATURED_IDS.forEach(function(fid){
    var item=ALL_ITEMS.filter(function(i){ return i.id===fid; })[0];
    if(!item||item.hidden) return;
    row.innerHTML+='<div class="featured-card">'+
      '<div class="badge">BEST</div>'+
      '<div class="fc-img">'+foodImg(item)+'</div>'+
      '<div class="fc-info">'+
        '<div class="fc-name">'+item.name+'</div>'+
        '<div class="fc-price">'+item.price+' บาท</div>'+
      '</div>'+
      '<button class="fc-add" onclick="add(\''+item.id+'\')">+</button>'+
    '</div>';
  });
}

function buildMenuList(){
  var list=document.getElementById('menu-list');
  list.innerHTML='';
  MENU.forEach(function(cat){
    var vis=cat.items.filter(function(i){ return !i.hidden; });
    if(!vis.length) return;
    list.innerHTML+='<div class="cat-header"><span class="cat-name">'+cat.category+'</span><span class="cat-price">('+cat.price+' บาท)</span></div>';
    vis.forEach(function(item){
      list.innerHTML+='<div class="card">'+
        '<div class="food-img">'+foodImg(item)+'</div>'+
        '<div class="left">'+
          '<div class="name">'+item.name+'</div>'+
          '<div class="desc">'+(item.desc||'')+'</div>'+
        '</div>'+
        '<div class="qty">'+
          '<button class="btn" onclick="remove(\''+item.id+'\')">−</button>'+
          '<span class="qty-num" id="qty-'+item.id+'">0</span>'+
          '<button class="btn plus" onclick="add(\''+item.id+'\')">+</button>'+
        '</div>'+
      '</div>';
    });
  });
}

// ===== RENDER NOW (ไม่รอ Firebase) =====
buildFeatured();
buildMenuList();
render();
</script>

<!-- Firebase: เพิ่ม/อัพเดทข้อมูล หลังจาก UI โชว์แล้ว -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

async function syncFirestore() {
  try {
    const app = initializeApp({
      apiKey: "AIzaSyBJjzTASSDoezaH2lPTUP1Fn9jS6RR-OUo",
      authDomain: "im-oei.firebaseapp.com",
      projectId: "im-oei"
    });
    const db = getFirestore(app);

    // Settings
    const sDoc = await getDoc(doc(db, 'settings', 'store'));
    if (sDoc.exists()) {
      const s = sDoc.data();
      if (s.orderCutoff) document.getElementById('cutoff-text').textContent = 'รับออเดอร์ถึง ' + s.orderCutoff + ' น.';
      if (s.pickupStart && s.pickupEnd) document.getElementById('pickup-text').textContent = 'รับอาหาร ' + s.pickupStart + ' - ' + s.pickupEnd + ' น.';
      if (s.bannerUrl) document.getElementById('banner-section').innerHTML = '<div class="banner-img-wrap"><img src="' + s.bannerUrl + '" alt="banner"></div>';
      if (s.isOpen === false) {
        document.getElementById('closed-banner').style.display = 'block';
        document.getElementById('closed-banner').innerHTML = '<div class="closed-overlay">🔴 ร้านปิดรับออเดอร์แล้ว กรุณามาใหม่วันพรุ่งนี้</div>';
        const btn = document.getElementById('order-btn');
        btn.disabled = true; btn.textContent = 'ปิดรับออเดอร์'; btn.dataset.closed = '1';
      }
      if (s.featuredIds) FEATURED_IDS = s.featuredIds;
    }

    // Menu from Firestore
    const mSnap = await getDocs(collection(db, 'menu'));
    if (!mSnap.empty) {
      const catMap = {};
      const catOrder = ['sandwich','rice','noodle','drink','other'];
      mSnap.forEach(d => {
        const data = Object.assign({ id: d.id }, d.data());
        if (data.hidden) return;
        const k = data.catKey || 'other';
        if (!catMap[k]) catMap[k] = { category: data.category || k, catKey: k, price: data.price || 0, items: [], sortOrder: catOrder.indexOf(k) };
        catMap[k].items.push(data);
      });
      MENU = Object.values(catMap).sort((a,b) => (a.sortOrder||99)-(b.sortOrder||99));
      ALL_ITEMS = [].concat(...MENU.map(c => c.items));
      buildFeatured();
      buildMenuList();
      render();
    }
  } catch(e) {
    console.log('Firebase sync skipped:', e.message);
  }
}

syncFirestore();
</script>
</body>
</html>
