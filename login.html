<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>อิ่มเอ๋ย Im-Oei — เข้าสู่ระบบ</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --yellow:#FFC107;--yellow-dark:#F5A623;--yellow-light:#FFF8E1;
  --orange:#FF8C00;--bg:#F7F3EE;--white:#FFFFFF;
  --text:#2C2C2C;--text-sub:#999;--green:#4CAF50;--red:#E53935;
  --shadow:0 4px 20px rgba(0,0,0,0.09)
}
html,body{min-height:100%;background:var(--bg);font-family:'Sarabun',sans-serif;color:var(--text)}
.hero-top{position:fixed;inset:0;z-index:0;}
.hero-top-img{width:100%;height:100%;object-fit:cover;display:block;}
.hero-top-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.15) 0%,rgba(30,12,0,0.72) 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding-bottom:0;}
.hero-title{font-size:32px;font-weight:800;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,0.6);}
.hero-sub{font-size:14px;color:rgba(255,255,255,0.88);font-weight:600;margin-top:6px;text-shadow:0 1px 6px rgba(0,0,0,0.5);}
.page-wrap{position:relative;z-index:10;min-height:100vh;display:flex;flex-direction:column;justify-content:flex-end;padding:0 0 24px;}
.card-wrap{margin:0 16px;position:relative;}
.login-card{background:rgba(255,255,255,0.97);backdrop-filter:blur(12px);border-radius:24px;padding:24px 20px;box-shadow:0 8px 40px rgba(0,0,0,0.28);margin-bottom:12px}
.form-label{font-size:13px;font-weight:700;color:var(--text-sub);margin-bottom:6px;display:block}
.form-input{width:100%;border:2px solid #E8E8E8;border-radius:12px;padding:13px 16px;font-family:'Sarabun',sans-serif;font-size:15px;color:var(--text);outline:none;transition:border-color 0.2s;background:var(--white)}
.form-input:focus{border-color:var(--yellow)}
.form-group{margin-bottom:14px;position:relative}
.pwd-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;padding:0;line-height:1}
.login-btn{width:100%;padding:15px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--yellow),var(--yellow-dark));font-family:'Sarabun',sans-serif;font-size:16px;font-weight:800;color:#3E2000;cursor:pointer;box-shadow:0 4px 14px rgba(255,193,7,0.4);transition:transform 0.15s,opacity 0.15s;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px}
.login-btn:active{transform:scale(0.97)}
.login-btn:disabled{opacity:0.6;cursor:not-allowed}
.step-wrap{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:20px}
.step-dot{width:8px;height:8px;border-radius:50%;background:#E8E8E8;transition:all 0.3s}
.step-dot.active{background:var(--yellow-dark);width:22px;border-radius:4px}
.step-dot.done{background:var(--green)}
.step-panel{display:none}
.step-panel.active{display:block}
.info-box{background:var(--yellow-light);border-radius:10px;padding:10px 14px;font-size:12px;font-weight:600;color:#5D3A00;margin-bottom:16px}
.error-box{display:none;background:#FFEBEE;color:#B71C1C;border-radius:10px;padding:10px 14px;font-size:13px;font-weight:700;margin-bottom:14px;text-align:center}
.phone-hint{font-size:11px;color:var(--text-sub);margin-top:4px}
.back-link{text-align:center;padding:12px;font-size:13px;color:var(--text-sub)}
.back-link a{color:var(--orange);font-weight:700;text-decoration:none}
.divider{display:flex;align-items:center;gap:10px;color:var(--text-sub);font-size:12px;margin:16px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#E8E8E8}
.skip-link{width:100%;padding:12px;border-radius:12px;border:2px solid #E8E8E8;background:transparent;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:700;color:var(--text-sub);cursor:pointer;transition:all 0.2s;margin-top:8px}
.skip-link:hover{border-color:var(--yellow);color:var(--orange)}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,0.85);display:flex;align-items:center;justify-content:center;z-index:999;opacity:0;pointer-events:none;transition:opacity 0.2s}
.loading-overlay.show{opacity:1;pointer-events:all}
.spinner{width:44px;height:44px;border-radius:50%;border:4px solid #FFE082;border-top-color:var(--yellow-dark);animation:spin 0.75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(10px);background:rgba(44,44,44,0.92);color:#fff;padding:10px 22px;border-radius:30px;font-size:13px;font-weight:600;opacity:0;transition:all 0.28s;z-index:600;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.checking-ring{display:inline-block;width:18px;height:18px;border-radius:50%;border:3px solid rgba(62,32,0,0.3);border-top-color:#3E2000;animation:spin 0.7s linear infinite;vertical-align:middle}
</style>
</head>
<body>

<div class="hero-top">
  <img class="hero-top-img" src="hero.webp" alt="อิ่มเอ้ย">
  <div class="hero-top-overlay">
    <div class="hero-title">🍜 อิ่มเอ๋ย</div>
    <div class="hero-sub">เข้าสู่ระบบ</div>
  </div>
</div>

<div class="page-wrap">
<div class="card-wrap">
  <div class="login-card">

    <div class="step-wrap">
      <div class="step-dot active" id="dot-1"></div>
      <div class="step-dot" id="dot-2"></div>
    </div>

    <div class="error-box" id="error-box">
      <span id="error-msg">เกิดข้อผิดพลาด</span>
    </div>

    <!-- STEP 1: กรอกรหัสผ่าน -->
    <div id="step-1" class="step-panel active">
      <div class="info-box">
        🔑 กรอกรหัสผ่านเพื่อเข้าระบบแอดมิน หรือกด <strong>"ฉันเป็นลูกค้า"</strong> เพื่อสั่งอาหาร
      </div>
      <div class="form-group">
        <label class="form-label">รหัสผ่าน</label>
        <input type="password" class="form-input" id="pwd-input"
          placeholder="กรอกรหัสผ่าน (admin / เจ้าของร้าน)"
          onkeydown="if(event.key==='Enter')checkPassword()">
        <button class="pwd-toggle" id="pwd-eye" onclick="togglePwd()">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <button class="login-btn" id="pwd-btn" onclick="checkPassword()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        ตรวจสอบรหัสผ่าน
      </button>
      <div class="divider">หรือ</div>
      <button class="skip-link" onclick="goCustomer()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        ฉันเป็นลูกค้า (สั่งอาหาร)
      </button>
    </div>

    <!-- STEP 2: กรอกชื่อ-เบอร์ลูกค้า -->
    <div id="step-2" class="step-panel">
      <div class="info-box">📱 กรอกชื่อและเบอร์โทรเพื่อติดตามออเดอร์ของคุณ</div>
      <div class="form-group">
        <label class="form-label">ชื่อของคุณ</label>
        <input type="text" class="form-input" id="cust-name"
          placeholder="เช่น สมชาย, นิสา" maxlength="30">
      </div>
      <div class="form-group">
        <label class="form-label">เบอร์โทรศัพท์</label>
        <input type="tel" class="form-input" id="cust-phone"
          placeholder="0812345678" maxlength="10"
          oninput="this.value=this.value.replace(/\D/g,'')"
          onkeydown="if(event.key==='Enter')customerLogin()">
        <div class="phone-hint">ใช้สำหรับติดตามออเดอร์ ไม่มีการส่ง SMS</div>
      </div>
      <button class="login-btn" onclick="customerLogin()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        เข้าสู่ระบบ
      </button>
      <button class="skip-link" onclick="backToStep1()">← ย้อนกลับ</button>
    </div>

  </div>
  <div class="back-link"><a href="index.html" style="color:rgba(255,255,255,0.85);text-shadow:0 1px 4px rgba(0,0,0,0.5);">← กลับหน้าหลัก</a></div>
</div>
</div>

<div class="loading-overlay" id="loading"><div class="spinner"></div></div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyBJjzTASSDoezaH2lPTUP1Fn9jS6RR-OUo",
  authDomain: "im-oei.firebaseapp.com",
  projectId: "im-oei"
});
const db = getFirestore(app);

function showLoading(v){ document.getElementById('loading').classList.toggle('show',v); }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
function showError(msg){ const b=document.getElementById('error-box'); document.getElementById('error-msg').textContent=msg; b.style.display='block'; setTimeout(()=>b.style.display='none',3500); }
function hideError(){ document.getElementById('error-box').style.display='none'; }

async function sha256(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function showStep(n){
  document.querySelectorAll('.step-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('step-'+n).classList.add('active');
  document.getElementById('dot-1').className = 'step-dot' + (n>1?' done':' active');
  document.getElementById('dot-2').className = 'step-dot' + (n===2?' active':'');
  hideError();
}

window.backToStep1 = ()=>showStep(1);

window.togglePwd = function(){
  const inp=document.getElementById('pwd-input');
  const eye=document.getElementById('pwd-eye');
  if(inp.type==='password'){
    inp.type='text';
    eye.innerHTML='<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
  } else {
    inp.type='password';
    eye.innerHTML='<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
  }
};

window.checkPassword = async function(){
  const pwd = document.getElementById('pwd-input').value;
  if(!pwd){ showError('กรุณากรอกรหัสผ่าน'); return; }

  const btn = document.getElementById('pwd-btn');
  btn.disabled=true;
  btn.innerHTML='<span class="checking-ring"></span> กำลังตรวจสอบ…';

  try {
    const snap = await getDoc(doc(db,'settings','auth'));
    const inputHash = await sha256(pwd);

    if(snap.exists()){
      const data = snap.data();

      // เจ้าของร้าน
      if(data.ownerHash && inputHash===data.ownerHash){
        sessionStorage.setItem('imkum_user', JSON.stringify({role:'owner',name:'เจ้าของร้าน',loginAt:Date.now()}));
        sessionStorage.setItem('imkum_admin_auth','1');
        showToast('👑 ยินดีต้อนรับ เจ้าของร้าน!');
        setTimeout(()=>window.location.href='admin.html',700);
        return;
      }

      // แอดมิน
      if(data.adminHash && inputHash===data.adminHash){
        sessionStorage.setItem('imkum_user', JSON.stringify({role:'admin',name:'แอดมิน',loginAt:Date.now()}));
        sessionStorage.setItem('imkum_admin_auth','1');
        showToast('🧑‍🍳 ยินดีต้อนรับ แอดมิน!');
        setTimeout(()=>window.location.href='admin.html',700);
        return;
      }

      // ไม่ตรง
      showError('รหัสผ่านไม่ถูกต้อง กรุณาลองใหม่');
      document.getElementById('pwd-input').value='';
      return;
    }

    // ยังไม่มีรหัสในระบบ
    btn.disabled=false; btn.innerHTML='<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> ตรวจสอบรหัสผ่าน';
    const role = prompt('ยังไม่มีรหัสในระบบ ต้องการตั้งรหัสนี้เป็น:\n1 = แอดมิน\n2 = เจ้าของร้าน\n\nกรอก 1 หรือ 2');
    if(!role) return;
    btn.disabled=true; btn.innerHTML='<span class="checking-ring"></span> กำลังตั้งรหัส…';

    if(role.trim()==='1'){
      await setDoc(doc(db,'settings','auth'),{adminHash:inputHash},{merge:true});
      sessionStorage.setItem('imkum_user', JSON.stringify({role:'admin',name:'แอดมิน',loginAt:Date.now()}));
      sessionStorage.setItem('imkum_admin_auth','1');
      showToast('✅ ตั้งรหัสแอดมินสำเร็จ!');
      setTimeout(()=>window.location.href='admin.html',900);
    } else if(role.trim()==='2'){
      await setDoc(doc(db,'settings','auth'),{ownerHash:inputHash},{merge:true});
      sessionStorage.setItem('imkum_user', JSON.stringify({role:'owner',name:'เจ้าของร้าน',loginAt:Date.now()}));
      sessionStorage.setItem('imkum_admin_auth','1');
      showToast('✅ ตั้งรหัสเจ้าของร้านสำเร็จ!');
      setTimeout(()=>window.location.href='admin.html',900);
    } else {
      showError('กรุณากรอก 1 หรือ 2 เท่านั้น');
    }
  } catch(e){
    console.error('checkPassword error:',e);
    showError('เชื่อมต่อระบบไม่ได้: '+e.message);
  } finally {
    btn.disabled=false;
    btn.innerHTML='<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> ตรวจสอบรหัสผ่าน';
  }
};

window.goCustomer = function(){
  const savedName = localStorage.getItem('imkum_name')||'';
  const savedPhone = localStorage.getItem('imkum_phone')||'';
  if(savedName) document.getElementById('cust-name').value=savedName;
  if(savedPhone) document.getElementById('cust-phone').value=savedPhone;
  showStep(2);
};

window.customerLogin = async function(){
  const name = document.getElementById('cust-name').value.trim();
  const phone = document.getElementById('cust-phone').value.trim();
  if(!name){ showError('กรุณากรอกชื่อของคุณ'); return; }
  if(!phone||phone.length<9){ showError('กรุณากรอกเบอร์โทรให้ครบถ้วน'); return; }

  showLoading(true);
  try {
    const existing = await getDoc(doc(db,'customers',phone));
    if(existing.exists()){
      const existingName = existing.data().name||'';
      if(existingName===name){
        sessionStorage.setItem('imkum_user', JSON.stringify({role:'customer',name,phone,loginAt:Date.now()}));
        localStorage.setItem('imkum_name',name);
        localStorage.setItem('imkum_phone',phone);
        setDoc(doc(db,'customers',phone),{lastLogin:new Date().toISOString()},{merge:true}).catch(()=>{});
        window.location.href='index.html';
        return;
      } else {
        showError('เบอร์ '+phone+' ถูกลงทะเบียนโดย "'+existingName+'" แล้ว\nกรุณาใช้เบอร์อื่น หรือกรอกชื่อให้ตรงกัน');
        return;
      }
    }
    sessionStorage.setItem('imkum_user', JSON.stringify({role:'customer',name,phone,loginAt:Date.now()}));
    localStorage.setItem('imkum_name',name);
    localStorage.setItem('imkum_phone',phone);
    setDoc(doc(db,'customers',phone),{name,phone,lastLogin:new Date().toISOString()},{merge:true}).catch(()=>{});
    window.location.href='index.html';
  } catch(e){
    console.error(e);
    sessionStorage.setItem('imkum_user', JSON.stringify({role:'customer',name,phone,loginAt:Date.now()}));
    localStorage.setItem('imkum_name',name);
    localStorage.setItem('imkum_phone',phone);
    window.location.href='index.html';
  } finally {
    showLoading(false);
  }
};

// Auto-redirect
const sess = sessionStorage.getItem('imkum_user');
if(sess){
  try {
    const user = JSON.parse(sess);
    if(Date.now()-(user.loginAt||0) > 8*60*60*1000){
      sessionStorage.clear();
    } else {
      window.location.href = user.role==='customer' ? 'index.html' : 'admin.html';
    }
  } catch(e){ sessionStorage.clear(); }
}
</script>
</body>
</html>
