<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>อิ่มเอ๋ย Im-Oei</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--yellow:#FFC107;--yellow-dark:#F5A623;--yellow-light:#FFF8E1;--orange:#FF8C00;--bg:#F7F3EE;--white:#FFFFFF;--text:#2C2C2C;--text-sub:#999;--green:#4CAF50;--red:#E53935;--shadow:0 4px 20px rgba(0,0,0,0.09)}
html,body{min-height:100%;background:var(--bg);font-family:'Sarabun',sans-serif;color:var(--text)}

.hero-top{position:relative;overflow:hidden;border-radius:0 0 32px 32px;}
.hero-top-img{width:100%;height:220px;object-fit:cover;display:block;}
.hero-top-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.08) 0%,rgba(62,32,0,0.65) 100%);display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:24px;}
.hero-title{font-size:26px;font-weight:800;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,0.5);}
.hero-sub{font-size:13px;color:rgba(255,255,255,0.88);font-weight:600;margin-top:4px;text-shadow:0 1px 4px rgba(0,0,0,0.4);}

.card-wrap{margin:-28px 16px 0;position:relative;z-index:10}.login-card{background:var(--white);border-radius:24px;padding:24px 20px;box-shadow:0 8px 32px rgba(0,0,0,0.12);margin-bottom:16px}

/* TABS */
.role-tabs{display:flex;border-radius:14px;overflow:hidden;background:#F0E8D8;padding:4px;gap:4px;margin-bottom:20px}
.role-tab{flex:1;padding:10px 4px;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:700;border:none;background:transparent;cursor:pointer;border-radius:10px;color:var(--text-sub);transition:all 0.2s;text-align:center}
.role-tab.active{background:var(--white);color:var(--orange);box-shadow:0 2px 8px rgba(0,0,0,0.08)}

/* PANELS */
.panel{display:none}.panel.active{display:block}

/* FORM */
.form-label{font-size:13px;font-weight:700;color:var(--text-sub);margin-bottom:6px;display:block}
.form-input{width:100%;border:2px solid #E8E8E8;border-radius:12px;padding:13px 16px;font-family:'Sarabun',sans-serif;font-size:15px;color:var(--text);outline:none;transition:border-color 0.2s;background:var(--white)}
.form-input:focus{border-color:var(--yellow)}
.form-group{margin-bottom:14px;position:relative}
.pwd-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;padding:0}

.login-btn{width:100%;padding:15px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--yellow),var(--yellow-dark));font-family:'Sarabun',sans-serif;font-size:16px;font-weight:800;color:#3E2000;cursor:pointer;box-shadow:0 4px 14px rgba(255,193,7,0.4);transition:transform 0.15s;margin-top:4px}
.login-btn:active{transform:scale(0.97)}
.line-btn{width:100%;padding:15px;border-radius:14px;border:none;background:#06C755;font-family:'Sarabun',sans-serif;font-size:16px;font-weight:800;color:#fff;cursor:pointer;box-shadow:0 4px 14px rgba(6,199,85,0.4);transition:transform 0.15s;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:10px}
.line-btn:active{transform:scale(0.97)}
.line-divider{display:flex;align-items:center;gap:10px;margin:14px 0;color:#B0B0B0;font-size:13px}
.line-divider::before,.line-divider::after{content:'';flex:1;height:1px;background:#EBEBEB}

.error-box{display:none;background:#FFEBEE;color:#B71C1C;border-radius:10px;padding:10px 14px;font-size:13px;font-weight:700;margin-bottom:14px;text-align:center}
.info-box{background:var(--yellow-light);border-radius:10px;padding:10px 14px;font-size:12px;font-weight:600;color:#5D3A00;margin-bottom:14px}

/* PHONE FORMAT */
.phone-hint{font-size:11px;color:var(--text-sub);margin-top:4px}

/* DIVIDER */
.divider{text-align:center;font-size:12px;color:var(--text-sub);margin:14px 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:38%;height:1px;background:#E8E8E8}
.divider::before{left:0}.divider::after{right:0}

/* BACK LINK */
.back-link{text-align:center;padding:12px;font-size:13px;color:var(--text-sub)}
.back-link a{color:var(--orange);font-weight:700;text-decoration:none}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,0.85);display:flex;align-items:center;justify-content:center;z-index:999;opacity:0;pointer-events:none;transition:opacity 0.2s}
.loading-overlay.show{opacity:1;pointer-events:all}
.spinner{width:44px;height:44px;border-radius:50%;border:4px solid #FFE082;border-top-color:var(--yellow-dark);animation:spin 0.75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(10px);background:rgba(44,44,44,0.92);color:#fff;padding:10px 22px;border-radius:30px;font-size:13px;font-weight:600;opacity:0;transition:all 0.28s;z-index:600;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
  <!-- LIFF SDK removed - ใช้ชื่อ-เบอร์แทน -->
</head>
<body>

<div class="hero-top">
  <img class="hero-top-img" src="hero.webp" alt="อิ่มเอ๋ย">

</div>

<div class="card-wrap">
  <div class="login-card">

    <!-- ROLE TABS -->
    <div class="role-tabs">
      <button class="role-tab active" onclick="switchRole('customer',this)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:4px"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>ลูกค้า
      </button>
      <button class="role-tab" onclick="switchRole('staff',this)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:4px"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 12h6M12 9v6"/></svg>แอดมิน
      </button>
      <button class="role-tab" onclick="switchRole('owner',this)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:4px"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>เจ้าของร้าน
      </button>
    </div>

    <!-- ERROR -->
    <div class="error-box" id="error-box">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:4px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="error-msg">เกิดข้อผิดพลาด</span>
    </div>

    <!-- ====== CUSTOMER PANEL ====== -->
    <div id="panel-customer" class="panel active">
      <div class="info-box">📱 กรอกชื่อและเบอร์โทรเพื่อติดตามออเดอร์ของคุณ</div>
      <div class="form-group">
        <label class="form-label">ชื่อของคุณ</label>
        <input type="text" class="form-input" id="cust-name" placeholder="เช่น สมชาย, นิสา" maxlength="30">
      </div>
      <div class="form-group">
        <label class="form-label">เบอร์โทรศัพท์</label>
        <input type="tel" class="form-input" id="cust-phone" placeholder="0812345678" maxlength="10"
          oninput="this.value=this.value.replace(/\D/g,'')">
        <div class="phone-hint">ใช้สำหรับติดตามออเดอร์ ไม่มีการส่ง SMS</div>
      </div>
      <button class="line-btn" onclick="loginWithLine()" style="display:none;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.02 2 11c0 3.67 2.17 6.88 5.38 8.65-.08.38-.52 2.44-.6 2.8 0 0-.01.08.04.11.05.03.11.01.11.01.47-.07 5.47-3.59 6.41-4.22.41.06.83.09 1.26.09C18.52 18.44 23 15.42 23 11S18.52 2 12 2z"/></svg>
        เข้าสู่ระบบด้วย LINE
      </button>
      <div class="line-divider" style="display:none;">หรือ</div>
      <button class="login-btn" onclick="customerLogin()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>เข้าสู่ระบบด้วยชื่อ-เบอร์
      </button>
    </div>

    <!-- ====== STAFF (ADMIN) PANEL ====== -->
    <div id="panel-staff" class="panel">
      <div class="info-box">🧑‍🍳 สำหรับพนักงานจัดการออเดอร์และเมนู</div>
      <div class="form-group">
        <label class="form-label">รหัสผ่านแอดมิน</label>
        <input type="password" class="form-input" id="staff-pwd" placeholder="กรอกรหัสผ่าน"
          onkeydown="if(event.key==='Enter')staffLogin()">
        <button class="pwd-toggle" onclick="togglePwd('staff-pwd',this)">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <button class="login-btn" onclick="staffLogin()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>เข้าสู่ระบบแอดมิน
      </button>
    </div>

    <!-- ====== OWNER PANEL ====== -->
    <div id="panel-owner" class="panel">
      <div class="info-box">👑 สำหรับเจ้าของร้าน ดูสถิติและตั้งค่าทุกอย่าง</div>
      <div class="form-group">
        <label class="form-label">รหัสผ่านเจ้าของร้าน</label>
        <input type="password" class="form-input" id="owner-pwd" placeholder="กรอกรหัสผ่าน"
          onkeydown="if(event.key==='Enter')ownerLogin()">
        <button class="pwd-toggle" onclick="togglePwd('owner-pwd',this)">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <button class="login-btn" onclick="ownerLogin()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>เข้าสู่ระบบเจ้าของร้าน
      </button>
    </div>

  </div>

  <div class="back-link">
    <a href="index.html">← กลับหน้าหลัก</a>
  </div>
</div>

<div class="loading-overlay" id="loading"><div class="spinner"></div></div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyBJjzTASSDoezaH2lPTUP1Fn9jS6RR-OUo",
  authDomain: "im-oei.firebaseapp.com",
  projectId: "im-oei"
});
const db = getFirestore(app);

// ========== UTILS ==========
function showLoading(v){ document.getElementById('loading').classList.toggle('show',v); }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
function showError(msg){ const b=document.getElementById('error-box'); document.getElementById('error-msg').textContent=msg; b.style.display='block'; setTimeout(()=>b.style.display='none',3000); }

window.switchRole = function(role, btn) {
  document.querySelectorAll('.role-tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-'+role).classList.add('active');
  document.getElementById('error-box').style.display='none';
};

window.togglePwd = function(inputId, btn) {
  const inp = document.getElementById(inputId);
  if(inp.type==='password'){ inp.type='text'; btn.textContent='🙈'; }
  else { inp.type='password'; btn.textContent='👁️'; }
};

// ========== LINE LOGIN ==========
// 🔧 ใส่ LIFF ID ของคุณที่นี่ (สร้างได้ที่ LINE Developers Console)
const LIFF_ID = 'YOUR_LIFF_ID_HERE';


// ===== RETURN URL HELPER =====
function getReturnUrl() {
  var ret = sessionStorage.getItem('imkum_return');
  if(ret){ sessionStorage.removeItem('imkum_return'); return ret; }
  return 'index.html';
}
window.loginWithLine = async function() {
  if(!LIFF_ID || LIFF_ID === 'YOUR_LIFF_ID_HERE'){
    showError('ปิดการใช้งาน LINE Login กรุณาใช้ชื่อ-เบอร์แทน');
    return;
  }
  showLoading(true);
  try {
    await liff.init({ liffId: LIFF_ID });
    if(!liff.isLoggedIn()){
      liff.login({ redirectUri: window.location.href });
      return;
    }
    const profile = await liff.getProfile();
    const name = profile.displayName;
    const lineId = profile.userId;
    const avatar = profile.pictureUrl || '';

    sessionStorage.setItem('imkum_user', JSON.stringify({ role:'customer', name, lineId, avatar }));
    localStorage.setItem('imkum_name', name);
    // บันทึกลง Firestore แบบ background
    const custRef = doc(db, 'customers', 'line_' + lineId);
    const now = new Date().toISOString();
    setDoc(custRef, { name, lineId, avatar, lastLogin: now, loginType: 'line' }, { merge: true }).catch(()=>{});
    window.location.href = getReturnUrl();
  } catch(e) {
    console.error(e);
    showError('เกิดข้อผิดพลาดในการเข้าสู่ระบบด้วย LINE');
  } finally {
    showLoading(false);
  }
};

// ========== CUSTOMER LOGIN ==========
window.customerLogin = async function() {
  const name = document.getElementById('cust-name').value.trim();
  const phone = document.getElementById('cust-phone').value.trim();
  if(!name){ showError('กรุณากรอกชื่อของคุณ'); return; }
  if(!phone || phone.length < 9){ showError('กรุณากรอกเบอร์โทรให้ครบถ้วน'); return; }

  showLoading(true);
  try {
    // บันทึก session ทันที (ไม่รอ Firestore)
    sessionStorage.setItem('imkum_user', JSON.stringify({ role:'customer', name, phone, loginAt: Date.now() }));
    localStorage.setItem('imkum_name', name);
    localStorage.setItem('imkum_phone', phone);
    // พยายามบันทึกลง Firestore แบบ background (ไม่บล็อก)
    const now = new Date().toISOString();
    setDoc(doc(db, 'customers', phone), { name, phone, lastLogin: now }, { merge: true }).catch(()=>{});
    window.location.href = getReturnUrl();
  } catch(e) {
    console.error(e);
    // ถ้า error ก็ยังเข้าได้ เพราะ session บันทึกไปแล้ว
    window.location.href = getReturnUrl();
  } finally {
    showLoading(false);
  }
};

// ========== HASH HELPER ==========
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ========== STAFF LOGIN (ตรวจสอบ hash จาก Firestore) ==========
window.staffLogin = async function() {
  const pwd = document.getElementById('staff-pwd').value;
  if(!pwd){ showError('กรุณากรอกรหัสผ่าน'); return; }
  showLoading(true);
  try {
    const snap = await getDoc(doc(db, 'settings', 'auth'));
    const storedHash = snap.exists() ? (snap.data().adminHash || '') : '';
    if(!storedHash){ showError('ยังไม่ได้ตั้งรหัสผ่านแอดมิน กรุณาติดต่อเจ้าของร้าน'); return; }
    const inputHash = await sha256(pwd);
    if(inputHash === storedHash){
      sessionStorage.setItem('imkum_user', JSON.stringify({ role:'admin', name:'แอดมิน', loginAt: Date.now() }));
      sessionStorage.setItem('imkum_admin_auth','1');
      window.location.href = 'admin.html';
    } else {
      showError('รหัสผ่านไม่ถูกต้อง');
      document.getElementById('staff-pwd').value='';
    }
  } catch(e) {
    console.error(e);
    showError('เชื่อมต่อ Firestore ไม่ได้ กรุณาลองใหม่');
  } finally {
    showLoading(false);
  }
};

// ========== OWNER LOGIN (ตรวจสอบ hash จาก Firestore) ==========
window.ownerLogin = async function() {
  const pwd = document.getElementById('owner-pwd').value;
  if(!pwd){ showError('กรุณากรอกรหัสผ่าน'); return; }
  showLoading(true);
  try {
    const snap = await getDoc(doc(db, 'settings', 'auth'));
    const storedHash = snap.exists() ? (snap.data().ownerHash || '') : '';
    if(!storedHash){ showError('ยังไม่ได้ตั้งรหัสผ่านเจ้าของร้าน กรุณาติดต่อเจ้าของร้าน'); return; }
    const inputHash = await sha256(pwd);
    if(inputHash === storedHash){
      sessionStorage.setItem('imkum_user', JSON.stringify({ role:'owner', name:'เจ้าของร้าน', loginAt: Date.now() }));
      sessionStorage.setItem('imkum_admin_auth','1');
      window.location.href = 'admin.html';
    } else {
      showError('รหัสผ่านไม่ถูกต้อง');
      document.getElementById('owner-pwd').value='';
    }
  } catch(e) {
    console.error(e);
    showError('เชื่อมต่อ Firestore ไม่ได้ กรุณาลองใหม่');
  } finally {
    showLoading(false);
  }
};

// Auto redirect ถ้า login อยู่แล้ว (ตรวจ expiry 8 ชั่วโมง)
const sess = sessionStorage.getItem('imkum_user');
if(sess){
  const user = JSON.parse(sess);
  const loginAt = user.loginAt || 0;
  const EIGHT_HOURS = 8 * 60 * 60 * 1000;
  if(Date.now() - loginAt > EIGHT_HOURS){
    sessionStorage.clear(); // หมดอายุ
  } else {
    if(user.role === 'customer') window.location.href = getReturnUrl();
    else window.location.href = 'admin.html';
  }
}
</script>
</body>
</html>
